<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BuxStore</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
/* Fundo com imagem */
body {
  background-image: url("./background.jpg");
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  color: white;
  overflow-x: hidden;
}

/* Camada escura */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: -1;
}

/* Partículas */
.glow {
  position: fixed;
  width: 4px;
  height: 4px;
  background: #facc15;
  border-radius: 50%;
  box-shadow: 0 0 10px #facc15, 0 0 20px #facc15;
  animation: float 10s linear infinite;
  opacity: 0.7;
}

@keyframes float {
  from { transform: translateY(100vh); opacity: 0; }
  to { transform: translateY(-10vh); opacity: 1; }
}

/* Notificação */
#notification {
  position: fixed;
  bottom: 20px;
  left: 20px;
  background: rgba(17,24,39,0.95);
  padding: 12px 18px;
  border-radius: 12px;
  box-shadow: 0 0 20px rgba(250,204,21,0.6);
  display: none;
}
</style>
</head>

<body>

<header class="bg-black bg-opacity-70 p-6 text-center shadow-lg">
  <h1 class="text-3xl font-bold text-yellow-400">BUXSTORE</h1>
</header>

<section class="text-center py-12">
  <h2 class="text-4xl font-extrabold">Compre Robux Instantaneamente ⚡</h2>
</section>

<section class="max-w-4xl mx-auto grid md:grid-cols-3 gap-8 px-6">

  <div class="bg-black bg-opacity-70 p-6 rounded-2xl text-center shadow-xl">
    <h3 class="text-xl font-bold mb-4">500 Robux</h3>
    <p class="mb-4">R$ 7,00</p>
    <button onclick="openPix()" class="bg-yellow-400 text-black px-4 py-2 rounded-xl font-bold hover:scale-105 transition">Pagar com Pix</button>
  </div>

  <div class="bg-black bg-opacity-70 p-6 rounded-2xl text-center shadow-xl">
    <h3 class="text-xl font-bold mb-4">1200 Robux</h3>
    <p class="mb-4">R$ 22,90</p>
    <button onclick="openPix()" class="bg-yellow-400 text-black px-4 py-2 rounded-xl font-bold hover:scale-105 transition">Pagar com Pix</button>
  </div>

  <div class="bg-black bg-opacity-70 p-6 rounded-2xl text-center shadow-xl">
    <h3 class="text-xl font-bold mb-4">3000 Robux</h3>
    <p class="mb-4">R$ 68,00</p>
    <button onclick="openPix()" class="bg-yellow-400 text-black px-4 py-2 rounded-xl font-bold hover:scale-105 transition">Pagar com Pix</button>
  </div>

</section>

<!-- Modal Pix com animação -->
<div id="pixModal" class="fixed inset-0 bg-black bg-opacity-80 hidden items-center justify-center transition-opacity duration-300">

  <div id="pixContent"
       class="bg-gray-900 p-8 rounded-2xl text-center max-w-sm transform scale-75 opacity-0 transition-all duration-300">

    <h3 class="text-xl font-bold mb-4">Pagamento via Pix</h3>

    <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=00020126580014BR.GOV.BCB.PIX0136f897d3b2-432b-4d96-a881-321949f4f2a352040000530398654047.005802BR5925Eduardo Gabriel de Andrad6009SAO PAULO621405109ImWx845Dx63046070"
         class="mx-auto mb-4 rounded-lg">

    <textarea id="pixCode" class="w-full text-black p-2 rounded text-xs">
00020126580014BR.GOV.BCB.PIX0136f897d3b2-432b-4d96-a881-321949f4f2a352040000530398654047.005802BR5925Eduardo Gabriel de Andrad6009SAO PAULO621405109ImWx845Dx63046070
    </textarea>

    <button onclick="copyPix()" class="bg-yellow-400 text-black px-4 py-2 mt-3 rounded-xl font-bold hover:scale-105 transition">
      Copiar Código Pix
    </button>

    <br><br>

    <button onclick="closePix()" class="text-red-400">
      Fechar
    </button>

  </div>
</div>

<footer class="text-center mt-16 mb-10 space-y-2">
  <p>🔥 TikTok: rbxbaratooofc</p>
  <p>✉️ Email: Robuxbarato.gmail</p>
  <p>🎮 Discord: rbxbarato</p>
  <p class="text-gray-300 mt-4">© 2026 BuxStore</p>
</footer>

<div id="notification"></div>

<script>
/* Modal animado */
function openPix() {
  const modal = document.getElementById("pixModal");
  const content = document.getElementById("pixContent");

  modal.classList.remove("hidden");
  modal.classList.add("flex");

  setTimeout(() => {
    content.classList.remove("scale-75", "opacity-0");
    content.classList.add("scale-100", "opacity-100");
  }, 50);
}

function closePix() {
  const modal = document.getElementById("pixModal");
  const content = document.getElementById("pixContent");

  content.classList.remove("scale-100", "opacity-100");
  content.classList.add("scale-75", "opacity-0");

  setTimeout(() => {
    modal.classList.add("hidden");
    modal.classList.remove("flex");
  }, 300);
}

function copyPix() {
  let copyText = document.getElementById("pixCode");
  copyText.select();
  document.execCommand("copy");
  alert("Código Pix copiado!");
}

/* Partículas */
for (let i = 0; i < 25; i++) {
  let glow = document.createElement("div");
  glow.className = "glow";
  glow.style.left = Math.random() * 100 + "vw";
  glow.style.animationDuration = (5 + Math.random() * 10) + "s";
  glow.style.opacity = Math.random();
  document.body.appendChild(glow);
}

/* Notificação Fake */
const names = ["Rafael", "Lucas", "Marcos", "João", "Pedro", "Gabriel"];
const amounts = ["500 Robux", "1200 Robux", "3000 Robux"];

function showNotification() {
  const notification = document.getElementById("notification");
  const randomName = names[Math.floor(Math.random() * names.length)];
  const randomAmount = amounts[Math.floor(Math.random() * amounts.length)];
  notification.innerHTML = "🛒 " + randomName + " acabou de comprar " + randomAmount + "!";
  notification.style.display = "block";

  setTimeout(() => {
    notification.style.display = "none";
  }, 4000);
}

setInterval(showNotification, 8000);
</script>

</body>
</html>
