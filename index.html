<!DOCTYPE html>
<html lang="pt-BR">
<head>

<body class="text-white">

class="absolute top-4 right-4 w-14 opacity-20">

<p class="text-gray-400 text-sm mb-4">⭐ 892 avaliações</p>

class="bg-yellow-400 text-black px-5 py-2 rounded-xl font-bold hover:scale-110 transition">
Pagar com Pix
</button>

<!-- 3000 ROBUX -->
<div class="card p-6 rounded-2xl text-center shadow-xl relative overflow-hidden hover:scale-105 transition">

class="absolute top-4 right-4 w-14 opacity-20">

<!-- MODAL PIX -->

<div id="pixModal" class="fixed inset-0 hidden items-center justify-center modal-bg">

<div id="pixContent" class="bg-gray-900 p-8 rounded-2xl text-center transform scale-75 opacity-0 transition duration-300">

<h2 class="text-xl font-bold mb-4">
Pague com Pix
</h2>

<img id="pixImage" class="mx-auto mb-4 rounded-lg">

<textarea id="pixCode" readonly class="w-full h-20 text-black p-2 rounded"></textarea>

<button onclick="copyPix()" class="mt-4 bg-green-500 px-4 py-2 rounded font-bold">
Copiar código Pix
</button>

<br><br>

<button onclick="closePix()" class="text-red-400">
Fechar
</button>

</div>


<footer class="text-center mt-16 text-gray-400 text-sm pb-10">

<p>TikTok: rbxbaratooofc 🔥</p>
<p>Email: Robuxbarato.gmail ✉️</p>
<p>Discord: rbxbarato</p>

</footer>


<script>

function openPix(codigo){

document.getElementById("pixCode").value = codigo

document.getElementById("pixImage").src =
"https://api.qrserver.com/v1/create-qr-code/?size=200x200&data="+encodeURIComponent(codigo)

const modal = document.getElementById("pixModal")
const content = document.getElementById("pixContent")

modal.classList.remove("hidden")
modal.classList.add("flex")

setTimeout(()=>{
content.classList.remove("scale-75","opacity-0")
content.classList.add("scale-100","opacity-100")
},100)

}

function closePix(){

const modal=document.getElementById("pixModal")
modal.classList.add("hidden")

}

function copyPix(){

const copyText=document.getElementById("pixCode")

copyText.select()
copyText.setSelectionRange(0,99999)

document.execCommand("copy")

alert("Código Pix copiado!")

}

</script>

</body>
</html>
